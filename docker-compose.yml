services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KEYCLOAK_OPENWEBUI_SECRET: "${KEYCLOAK_OPENWEBUI_SECRET}"
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-fredy}"
      POSTGRES_USER: "${POSTGRES_USER:-fredy}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fredy} -d ${POSTGRES_DB:-fredy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    depends_on:
      - postgres
      - agent
      - keycloak
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: "http://fredy-agent:8001/v1"
      OPENAI_API_KEY: "${AGENT_API_KEY}"
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: "postgresql://${POSTGRES_USER:-fredy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fredy}"
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      OAUTH_CLIENT_ID: "openwebui"
      OAUTH_CLIENT_SECRET: "${KEYCLOAK_OPENWEBUI_SECRET}"
      OPENID_PROVIDER_URL: "http://keycloak:8080/realms/fredy/.well-known/openid-configuration"
      OAUTH_PROVIDER_NAME: "Keycloak"
      ENABLE_OAUTH_SIGNUP: "true"
      ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
      OAUTH_ROLES_CLAIM: "roles"
      OAUTH_ALLOWED_ROLES: "user,admin"
      OAUTH_ADMIN_ROLES: "admin"
      DEFAULT_USER_ROLE: "user"
      ENABLE_API_KEY: "true"
    volumes:
      - open-webui:/app/backend/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"

  confluence-importer:
    build:
      context: .
      dockerfile: services/confluence-importer/Dockerfile
    container_name: confluence-importer
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      CONFLUENCE_BASE_URL: "${CONFLUENCE_BASE_URL}"
      CONFLUENCE_USERNAME: "${CONFLUENCE_USERNAME}"
      CONFLUENCE_API_TOKEN: "${CONFLUENCE_API_TOKEN}"
      CONFLUENCE_SPACES: "${CONFLUENCE_SPACES}"
      CONFLUENCE_INCLUDE_LABELS: "${CONFLUENCE_INCLUDE_LABELS:-}"
      CONFLUENCE_EXCLUDE_LABELS: "${CONFLUENCE_EXCLUDE_LABELS:-ignore,draft,archived}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1536}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-fredy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fredy}"
      CHUNKS_TABLE: "${CHUNKS_TABLE:-chunks}"
      SYNC_CRON: "${SYNC_CRON:-0 */6 * * *}"
      SYNC_FULL_ON_START: "${SYNC_FULL_ON_START:-false}"
      CHUNK_MAX_TOKENS: "${CHUNK_MAX_TOKENS:-800}"
      CHUNK_OVERLAP_TOKENS: "${CHUNK_OVERLAP_TOKENS:-100}"
      LOCAL_FILES_ENABLED: "${LOCAL_FILES_ENABLED:-false}"
      LOCAL_FILES_EXTENSIONS: "${LOCAL_FILES_EXTENSIONS:-.md,.txt,.html}"
      MEDIA_ENABLED: "${MEDIA_ENABLED:-false}"
      MEDIA_CAPTION_ENABLED: "${MEDIA_CAPTION_ENABLED:-false}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - ./data/confluence-files:/data/files:ro

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    container_name: fredy-agent
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    # Not published to the host: Open-WebUI reaches the agent over the internal
    # network via the fredy-agent hostname. Re-add `ports: ["8001:8001"]` only
    # for local debugging.
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      LLM_FALLBACK_MODEL: "${LLM_FALLBACK_MODEL:-claude-sonnet-4-5-20250929}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openai}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-fredy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fredy}"
      CHUNKS_TABLE: "${CHUNKS_TABLE:-chunks}"
      RAG_PROFILE: "${RAG_PROFILE:-}"
      RERANKER: "${RERANKER:-none}"
      RERANK_API_KEY: "${RERANK_API_KEY:-}"
      RERANK_MODEL: "${RERANK_MODEL:-}"
      RERANK_TOP_N: "${RERANK_TOP_N:-10}"
      RERANK_THRESHOLD: "${RERANK_THRESHOLD:-0.0}"
      PORT: "8001"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ROLE_TOOL_CONFIG: >-
        {"admin":["vector_search"],"user":["vector_search"]}
      AGENT_API_KEY: "${AGENT_API_KEY:-}"
      AGENT_ALLOW_ANONYMOUS: "${AGENT_ALLOW_ANONYMOUS:-false}"
      KEYCLOAK_JWKS_URL: "${KEYCLOAK_JWKS_URL:-}"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-}"
      KEYCLOAK_AUDIENCE: "${KEYCLOAK_AUDIENCE:-fredy-agent}"
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-10}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
      OTEL_GENAI_CAPTURE_CONTENT: "${OTEL_GENAI_CAPTURE_CONTENT:-false}"

  jira-agent:
    build:
      context: .
      dockerfile: services/jira-agent/Dockerfile
    container_name: fredy-jira-agent
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    # Not published to the host: locally the poller is the only trigger. Jira
    # Cloud cannot reach localhost anyway — publish the port only when
    # tunnelling (cloudflared/ngrok) to receive webhooks:
    # ports: ["8002:8002"]
    environment:
      JIRA_BASE_URL: "${JIRA_BASE_URL:-}"
      JIRA_EMAIL: "${JIRA_EMAIL:-}"
      JIRA_API_TOKEN: "${JIRA_API_TOKEN:-}"
      JIRA_PROJECT_KEY: "${JIRA_PROJECT_KEY:-}"
      JIRA_AGENT_ACCOUNT_ID: "${JIRA_AGENT_ACCOUNT_ID:-}"
      JIRA_POLL_JQL: "${JIRA_POLL_JQL:-}"
      JIRA_POLL_INTERVAL_MS: "${JIRA_POLL_INTERVAL_MS:-60000}"
      JIRA_WEBHOOK_SECRET: "${JIRA_WEBHOOK_SECRET:-}"
      JIRA_TRANSITION_RESOLVE: "${JIRA_TRANSITION_RESOLVE:-Done}"
      JIRA_TRANSITION_WAITING: "${JIRA_TRANSITION_WAITING:-Waiting for customer}"
      TICKET_CACHE_TABLE: "${TICKET_CACHE_TABLE:-jira_ticket_cache}"
      JIRA_AGENT_PORT: "8002"
      # env_file passes SERVICE_NAME=fredy-agent to every container; pin the
      # correct logical name for log correlation.
      SERVICE_NAME: "fredy-jira-agent"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      LLM_FALLBACK_MODEL: "${LLM_FALLBACK_MODEL:-claude-sonnet-4-5-20250929}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openai}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-fredy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fredy}"
      CHUNKS_TABLE: "${CHUNKS_TABLE:-chunks}"
      RAG_DEFAULT_RETRIEVAL_LIMIT: "${RAG_DEFAULT_RETRIEVAL_LIMIT:-5}"
      # Deliberately looser than the chat agent's 0.7: short German ticket
      # queries against text-embedding-3-small score ~0.55–0.65 on clearly
      # relevant chunks; 0.7 returns nothing and forces know-nothing answers.
      RAG_SCORE_THRESHOLD: "${JIRA_RAG_SCORE_THRESHOLD:-0.5}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
      OTEL_GENAI_CAPTURE_CONTENT: "${OTEL_GENAI_CAPTURE_CONTENT:-false}"

volumes:
  pgdata:
  open-webui:
  keycloak_data:
