commit-msg:
  commands:
    validate-message:
      run: bash scripts/validate-commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    typecheck-agent:
      run: cd services/agent && pnpm exec tsc --noEmit
    lint-agent:
      run: cd services/agent && pnpm lint
    lint-confluence-importer:
      run: cd services/confluence-importer && uv run ruff check . && uv run ruff format --check .
    lint-eval:
      run: cd services/eval && uv run ruff check . && uv run ruff format --check .
    test-agent:
      run: cd services/agent && pnpm test
    test-confluence-importer:
      run: cd services/confluence-importer && uv run pytest
    test-eval:
      run: cd services/eval && uv run pytest
    check-secrets:
      run: bash scripts/check-secrets.sh
