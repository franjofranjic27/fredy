commit-msg:
  commands:
    validate-message:
      run: bash scripts/validate-commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    typecheck-agent:
      run: cd services/agent && pnpm exec tsc --noEmit
    typecheck-confluence-importer:
      run: cd services/confluence-importer && pnpm exec tsc --noEmit
    lint-agent:
      run: cd services/agent && pnpm lint
    lint-confluence-importer:
      run: cd services/confluence-importer && pnpm lint
    test-agent:
      run: cd services/agent && pnpm test
    # test-confluence-importer:        # enable after Todo 4 (services/confluence-importer/todos/04-tests-vitest.md)
    #   run: cd services/confluence-importer && pnpm test:run
    check-secrets:
      run: bash scripts/check-secrets.sh
