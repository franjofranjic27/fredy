name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @fredy/common run build

      - name: Typecheck agent
        run: cd services/agent && pnpm exec tsc --noEmit

      - name: Typecheck confluence-importer
        run: cd services/confluence-importer && pnpm exec tsc --noEmit

      - name: Lint agent
        run: cd services/agent && pnpm lint

      - name: Lint confluence-importer
        run: cd services/confluence-importer && pnpm lint

      - name: Test agent
        run: cd services/agent && pnpm test

      - name: Test confluence-importer
        run: cd services/confluence-importer && pnpm test:run
