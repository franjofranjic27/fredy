name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  agent:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @fredy/common run build

      - name: Typecheck agent
        run: cd services/agent && pnpm exec tsc --noEmit

      - name: Lint agent
        run: cd services/agent && pnpm lint

      - name: Test agent
        run: cd services/agent && pnpm test

  python:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: confluence-importer
            package: confluence_importer
          - service: eval
            package: rag_eval

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: services/${{ matrix.service }}/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Test with coverage
        run: uv run pytest --cov=${{ matrix.package }} --cov-report=xml
