name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history required for blame/new-code detection

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # The agent imports @fredy/agent-core from dist, so build it first
      - name: Build agent-core
        run: pnpm --filter @fredy/agent-core run build

      # Produces packages/agent-core/coverage/lcov.info for the Sonar scan
      - name: Run agent-core tests with coverage
        run: cd packages/agent-core && pnpm test

      # Produces services/agent/coverage/lcov.info for the Sonar scan
      - name: Run agent tests with coverage
        run: cd services/agent && pnpm test

      # Produces services/jira-agent/coverage/lcov.info for the Sonar scan
      - name: Run jira-agent tests with coverage
        run: cd services/jira-agent && pnpm test

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: services/*/uv.lock

      # Produces services/confluence-importer/coverage.xml for the Sonar scan
      - name: Run confluence-importer tests with coverage
        run: cd services/confluence-importer && uv sync && uv run pytest --cov=confluence_importer --cov-report=xml

      # Produces services/eval/coverage.xml for the Sonar scan
      - name: Run eval tests with coverage
        run: cd services/eval && uv sync && uv run pytest --cov=rag_eval --cov-report=xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
