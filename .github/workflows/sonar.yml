name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history required for blame/new-code detection

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @fredy/common run build

      - name: Run agent tests with coverage
        run: cd services/agent && pnpm test:coverage

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: services/*/uv.lock

      # Produces services/confluence-importer/coverage.xml for the Sonar scan
      - name: Run confluence-importer tests with coverage
        run: cd services/confluence-importer && uv sync && uv run pytest --cov=confluence_importer --cov-report=xml

      # Produces services/eval/coverage.xml for the Sonar scan
      - name: Run eval tests with coverage
        run: cd services/eval && uv sync && uv run pytest --cov=rag_eval --cov-report=xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
